[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/testimonials.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/banner.json"
  [headers.values]
    Cache-Control = "no-cache"

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

# Phase 1 redirects — service pages only
[[redirects]]
  from = "/tree-removal"
  to = "/services/tree-removal"
  status = 301

[[redirects]]
  from = "/tree-care"
  to = "/services/trimming-pruning"
  status = 301
