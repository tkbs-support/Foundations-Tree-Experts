[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/testimonials.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/banner.json"
  [headers.values]
    Cache-Control = "no-cache"

# ============================================================
# Old-site 301 redirects — PHASE-AWARE
# Live targets point to their real pages. Targets whose pages
# are not deployed yet route to "/" until they go live.
# TO RESTORE a deferred redirect once its page deploys: replace
# `to = "/"` with the path shown in the comment above the block.
# Current live set: homepage, /services + 6 service pages.
# ============================================================

[[redirects]]
  from = "/index.html"
  to = "/"
  status = 301

